name: CI Build Security Scan

on:
  push:
    branches: ["main", "develop"]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: node/package-lock.json

      - name: Install Node dependencies
        run: |
          cd node
          npm ci

      - name: Build Node app
        run: |
          cd node
          npm run build --if-present

      - name: Test Node app
        run: |
          cd node
          npm test --if-present

      # Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Install Python dependencies
        run: |
          cd python
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Python tests
        run: |
          cd python
          if ls test_*.py tests >/dev/null 2>&1; then
            pytest
          else
            echo "No Python tests found, skipping."
          fi

  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Node audit
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: node/package-lock.json

      - name: Install Node dependencies
        run: |
          cd node
          npm ci

      - name: Run npm audit
        run: |
          cd node
          npm audit --json > npm-audit-report.json || true

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: node/npm-audit-report.json

      # Python audit
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Install Python dependencies
        run: |
          cd python
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run pip-audit
        run: |
          cd python
          pip-audit -f json -o pip-audit-report.json || true

      - name: Upload pip audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: python/pip-audit-report.json

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

  repo-scan:
    name: Filesystem Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

  docker-scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    needs: dependency-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Node Docker image
        run: docker build -t node-app ./node

      - name: Scan Node Docker image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: node-app
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Build Python Docker image
        run: docker build -t python-app ./python

      - name: Scan Python Docker image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: python-app
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
