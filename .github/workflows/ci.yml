name: Security & Dependency Scan for Docker Services

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

jobs:

  codeql-security:
    name: 🔐 CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  dependency-check:
    name: 📦 Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: codeql-security
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Node.js dependencies
      - name: Install Node.js dependencies
        run: |
          cd node
          npm install

      - name: Run npm audit
        run: |
          cd node
          npm audit --json > npm-audit-report.json

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: node/npm-audit-report.json

      # Python dependencies
      - name: Install Python dependencies
        run: |
          cd python
          pip install -r requirements.txt

      - name: Run pip-audit
        run: |
          cd python
          pip install pip-audit
          pip-audit -f json -o pip-audit-report.json

      - name: Upload pip audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: python/pip-audit-report.json

  docker-scan:
    name: 🐳 Docker Image Security Scan
    runs-on: ubuntu-latest
    needs: dependency-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Trivy
        uses: aquasecurity/trivy-action@v1
        with:
          version: "latest"

      - name: Scan Node.js Docker image
        run: |
          docker build -t node-app ./node
          trivy image --exit-code 1 --severity HIGH,CRITICAL node-app

      - name: Scan Python Docker image
        run: |
          docker build -t python-app ./python
          trivy image --exit-code 1 --severity HIGH,CRITICAL python-app
