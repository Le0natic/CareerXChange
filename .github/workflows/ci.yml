name: CI Build + Security Scan

on:
  push:
    branches: ["main", "develop"]
  pull_request:

permissions:
  contents: read

jobs:

  # =========================
  # 🏗️ BUILD & TEST
  # =========================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Fix Gitleaks issue

      # ---------- NODE ----------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: node/package-lock.json

      - name: Install Node dependencies
        run: |
          cd node
          npm ci

      - name: Run Node tests
        run: |
          cd node
          npm test --if-present

      # ---------- PYTHON ----------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Install Python dependencies
        run: |
          cd python
          pip install -r requirements.txt
          pip install pytest

      - name: Run Python tests
        run: |
          cd python
          pytest || echo "No tests"

  # =========================
  # 🔐 SECRET SCAN
  # =========================
  # secret-scan:
  #   name: Secret Scan (Gitleaks)
  #   runs-on: ubuntu-latest
  #   needs: build-and-test

  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4

  #     - name: Run Gitleaks
  #       uses: gitleaks/gitleaks-action@v2
  #       env:
  #         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  #       with:
  #         scan-mode: filesystem   # Avoid git issues

  # =========================
  # 📦 DEPENDENCY SCAN
  # =========================
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      # Node audit
      - name: Node audit
        run: |
          cd node
          npm install
          npm audit --json > npm-audit.json || true

      - name: Upload Node report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit
          path: node/npm-audit.json

      # Python audit
      - name: Python audit
        run: |
          cd python
          pip install pip-audit
          pip-audit -f json -o pip-audit.json || true

      - name: Upload Python report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit
          path: python/pip-audit.json

  # =========================
  # 🐳 DOCKER BUILD
  # =========================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Node image
        run: docker build -t node-app ./node

      - name: Build Python image
        run: docker build -t python-app ./python

  # =========================
  # 🔎 DOCKER SECURITY SCAN
  # =========================
  docker-scan:
    name: Docker Scan (Trivy)
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - uses: actions/checkout@v4

      - name: Build Node image
        run: docker build -t node-app ./node

      - name: Scan Node image
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: node-app
          severity: CRITICAL
          ignore-unfixed: true

      - name: Build Python image
        run: docker build -t python-app ./python

      - name: Scan Python image
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: python-app
          severity: CRITICAL
          ignore-unfixed: true
