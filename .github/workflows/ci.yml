name: CI Build + Security Scan

on:
  push:
    branches: ["main", "develop"]
  pull_request:

permissions:
  contents: read

jobs:

  # =========================
  # 🏗️ BUILD + TEST + COVERAGE
  # =========================
  build-and-test:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------- NODE ----------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: node/package-lock.json

      - name: Install Node dependencies
        run: |
          cd node
          npm ci

      - name: Run Node tests with coverage
        continue-on-error: true
        run: |
          cd node
          npm test -- --coverage --coverageReporters=text --coverageReporters=lcov --if-present

      - name: Upload Node coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-coverage
          path: |
            node/coverage
            node/coverage/lcov.info
          if-no-files-found: ignore

      # ---------- PYTHON ----------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python/requirements.txt

      - name: Install Python dependencies
        run: |
          cd python
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run Python tests with coverage
        continue-on-error: true
        run: |
          cd python
          PYTHONPATH=. python -m pytest \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            -v

      - name: Upload Python coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: |
            python/htmlcov
            python/coverage.xml
          if-no-files-found: ignore

  # =========================
  # 📦 DEPENDENCY SCAN
  # =========================
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Node audit
        run: |
          cd node
          npm install
          npm audit --json > npm-audit.json || true

      - name: Upload Node report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit
          path: node/npm-audit.json

      - name: Python audit
        run: |
          cd python
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -f json -o pip-audit.json || true

      - name: Upload Python report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit
          path: python/pip-audit.json

  # =========================
  # 🐳 DOCKER BUILD
  # =========================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Node image
        run: docker build -t node-app ./node

      - name: Build Python image
        run: docker build -t python-app ./python

  # =========================
  # 🔎 DOCKER SECURITY SCAN
  # =========================
  docker-scan:
    name: Docker Scan (Trivy)
    runs-on: ubuntu-latest
    needs: docker-build
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Build Node image
        run: docker build -t node-app ./node

      - name: Scan Node image
        uses: aquasecurity/trivy-action@v0.20.0
        continue-on-error: true
        with:
          image-ref: node-app
          severity: CRITICAL
          ignore-unfixed: true

      - name: Build Python image
        run: docker build -t python-app ./python

      - name: Scan Python image
        uses: aquasecurity/trivy-action@v0.20.0
        continue-on-error: true
        with:
          image-ref: python-app
          severity: CRITICAL
          ignore-unfixed: true
